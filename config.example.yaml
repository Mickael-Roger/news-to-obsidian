# news-to-obsidian configuration file
# Copy this file to config.yaml and adapt to your setup.

# ──────────────────────────────────────────────────────────────────────────────
# Paths
# ──────────────────────────────────────────────────────────────────────────────

# Absolute or ~ path to the FreshRSS SQLite database
freshrss_db: ~/freshrss/data/users/your_user/db.sqlite

# Absolute or ~ path to the root of your Obsidian vault
obsidian_vault: ~/Documents/Obsidian/MyVault

# ──────────────────────────────────────────────────────────────────────────────
# Behaviour
# ──────────────────────────────────────────────────────────────────────────────

# Remove the FreshRSS label from the entry after successful processing.
# Set to false if you want to test without side-effects (or use --dry-run).
remove_tag_after_processing: true

# ──────────────────────────────────────────────────────────────────────────────
# LLM
# ──────────────────────────────────────────────────────────────────────────────
# The openai Python SDK is used, so any OpenAI-compatible API endpoint works.

llm:
  # Model name as expected by the endpoint, e.g.:
  #   glm-4-flash          (Zhipu AI / GLM)
  #   gpt-4o               (OpenAI)
  #   mistral              (Ollama local)
  model: glm-4-flash

  # API key for the provider.
  # Leave empty to rely on the OPENAI_API_KEY environment variable.
  api_key: ""

  # Base URL of the OpenAI-compatible endpoint.
  # Leave empty to use the default OpenAI endpoint (https://api.openai.com/v1).
  # Examples:
  #   https://open.bigmodel.cn/api/paas/v4/   (Zhipu AI / GLM)
  #   http://localhost:11434/v1               (Ollama)
  base_url: "https://open.bigmodel.cn/api/paas/v4/"

  # Any extra openai.chat.completions.create parameters (optional)
  # temperature: 0.3
  # max_tokens: 4096

# ──────────────────────────────────────────────────────────────────────────────
# Rules
# ──────────────────────────────────────────────────────────────────────────────
# Each rule maps a FreshRSS label to a LLM consign and an output location.

rules:
  # ── Example 1: Quick personal note ─────────────────────────────────────────
  - tag: "To Note"
    consign: |
      Write a concise Obsidian note (200–400 words) about this article.
      Structure: a short summary paragraph, then a "Key takeaways" bullet list
      (3–5 bullets), and finally a "My thoughts" section with a few sentences
      of personal reflection written in first person.
      Use Markdown. Do not include the article metadata — it will be added as
      frontmatter automatically.
    output_folder: "News/Notes"
    filename_template: "{date}-{title}"
    include_content: true

  # ── Example 2: Full article page ───────────────────────────────────────────
  - tag: "To Page"
    consign: |
      Transform this article into a detailed Obsidian wiki page.
      Include: an introduction, clearly structured sections with ## headings,
      key concepts explained, relevant links (preserve any from the article),
      and a "References" section at the end.
      The tone should be encyclopaedic and neutral.
    output_folder: "Knowledge"
    filename_template: "{title}"
    include_content: true

  # ── Example 3: Watch list (no LLM content, just metadata) ──────────────────
  - tag: "To Watch"
    consign: |
      Write a very short note (2–3 sentences) explaining what this video or
      resource is about and why it could be worth watching.
      End with a "Watch later" checkbox: - [ ] Watch
    output_folder: "Watch Later"
    filename_template: "{date}-{title}"
    include_content: false
